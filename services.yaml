pulse_output:
  name: Pulse Output
  description: Pulses a CommBox output for a specific duration.
  target:
    entity:
      domain: switch
      integration: maya_commbox
  fields:
    duration:
      name: Duration
      description: Duration of the pulse in milliseconds.
      required: true
      default: 1000
      selector:
        number:
          min: 1
          max: 60000
          unit_of_measurement: ms
